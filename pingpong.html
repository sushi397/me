<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Retro Ping Pong</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #000000;
            color: #00fff2;
            font-family: 'Press Start 2P', cursive;
            overflow: hidden;
        }

        #game-container {
            position: relative;
            box-shadow: 0 0 20px #00fff2, inset 0 0 20px #00fff2;
            border: 4px solid #00fff2;
        }

        canvas {
            display: block;
            background-color: #000;
        }

        .ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .score-board {
            position: absolute;
            top: 20px;
            width: 100%;
            display: flex;
            justify-content: center;
            gap: 2rem;
            font-size: 3rem;
            color: rgba(255, 255, 255, 0.1);
            text-shadow: 0 0 10px #fff;
        }

        #start-screen,
        #game-over-screen {
            background-color: rgba(0, 0, 0, 0.9);
            border: 2px solid #00fff2;
            box-shadow: 0 0 15px #00fff2;
            pointer-events: auto;
            text-align: center;
            padding: 2rem;
            border-radius: 10px;
        }

        .hidden {
            display: none !important;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 2rem;
            color: #ff00ff;
            text-shadow: 0 0 10px #ff00ff, 2px 2px #fff;
        }

        p {
            margin-bottom: 2rem;
            line-height: 1.5;
            font-size: 0.9rem;
            color: #00fff2;
            text-shadow: 0 0 5px #00fff2;
        }

        .btn {
            background-color: transparent;
            color: #ffff00;
            border: 2px solid #ffff00;
            padding: 15px 30px;
            font-family: inherit;
            font-size: 1.2rem;
            cursor: pointer;
            transition: all 0.2s;
            text-transform: uppercase;
            box-shadow: 0 0 10px #ffff00;
            text-shadow: 0 0 5px #ffff00;
        }

        .btn:hover {
            transform: scale(1.1);
            background-color: #ffff00;
            color: #000;
            box-shadow: 0 0 20px #ffff00;
        }

        .back-link {
            position: absolute;
            top: 20px;
            left: 20px;
            color: #00fff2;
            text-decoration: none;
            font-size: 0.8rem;
            opacity: 0.7;
            pointer-events: auto;
            text-shadow: 0 0 5px #00fff2;
        }

        .back-link:hover {
            opacity: 1;
            text-decoration: underline;
        }
    </style>
</head>

<body>

    <a href="index.html" class="back-link">← Back to Portfolio</a>

    <div id="game-container">
        <canvas id="pong" width="600" height="400"></canvas>

        <div class="score-board">
            <span id="player-score">0</span>
            <span id="computer-score">0</span>
        </div>

        <div id="start-screen" class="ui-layer">
            <h1>PING PONG</h1>
            <p>Use Mouse or Arrow Keys to move.<br>First to 5 wins!</p>
            <button id="start-btn" class="btn">Start Game</button>
        </div>

        <div id="game-over-screen" class="ui-layer hidden">
            <h1 id="result-text">YOU WIN!</h1>
            <p>Score: <span id="final-score">0 - 0</span></p>
            <button id="restart-btn" class="btn">Play Again</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById("pong");
        const ctx = canvas.getContext("2d");

        // Game objects
        const ball = {
            x: canvas.width / 2,
            y: canvas.height / 2,
            radius: 10,
            velocityX: 5,
            velocityY: 5,
            speed: 5,
            color: "#ffff00"
        };

        const user = {
            x: 0,
            y: (canvas.height - 100) / 2,
            width: 10,
            height: 100,
            score: 0,
            color: "#00fff2"
        };

        const com = {
            x: canvas.width - 10,
            y: (canvas.height - 100) / 2,
            width: 10,
            height: 100,
            score: 0,
            color: "#ff00ff"
        };

        const net = {
            x: (canvas.width - 2) / 2,
            y: 0,
            height: 10,
            width: 2,
            color: "rgba(0, 255, 242, 0.3)"
        };

        // State
        let isGameRunning = false;
        let animationId;
        const WIN_SCORE = 5;

        // Draw functions
        function drawRect(x, y, w, h, color) {
            ctx.fillStyle = color;
            ctx.fillRect(x, y, w, h);
        }

        function drawArc(x, y, r, color) {
            ctx.fillStyle = color;
            ctx.beginPath();
            ctx.arc(x, y, r, 0, Math.PI * 2, true);
            ctx.closePath();
            ctx.fill();
        }

        function drawNet() {
            for (let i = 0; i <= canvas.height; i += 15) {
                drawRect(net.x, net.y + i, net.width, net.height, net.color);
            }
        }

        function render() {
            // Clear canvas
            drawRect(0, 0, canvas.width, canvas.height, "#000");

            drawNet();

            // Add glow
            ctx.shadowBlur = 15;

            ctx.shadowColor = user.color;
            drawRect(user.x, user.y, user.width, user.height, user.color);

            ctx.shadowColor = com.color;
            drawRect(com.x, com.y, com.width, com.height, com.color);

            ctx.shadowColor = ball.color;
            drawArc(ball.x, ball.y, ball.radius, ball.color);

            ctx.shadowBlur = 0; // Reset glow
        }

        function resetBall() {
            ball.x = canvas.width / 2;
            ball.y = canvas.height / 2;
            ball.velocityX = -ball.velocityX; // Send to other player
            ball.speed = 5; // Reset speed
        }

        function collision(b, p) {
            p.top = p.y;
            p.bottom = p.y + p.height;
            p.left = p.x;
            p.right = p.x + p.width;

            b.top = b.y - b.radius;
            b.bottom = b.y + b.radius;
            b.left = b.x - b.radius;
            b.right = b.x + b.radius;

            return p.left < b.right && p.top < b.bottom && p.right > b.left && p.bottom > b.top;
        }

        function update() {
            // Move the ball
            ball.x += ball.velocityX;
            ball.y += ball.velocityY;

            // Simple AI
            let computerLevel = 0.08; // 0.1 is standard, 0.08 is slightly easier
            com.y += (ball.y - (com.y + com.height / 2)) * computerLevel;

            // Wall collision (top & bottom)
            if (ball.y - ball.radius < 0 || ball.y + ball.radius > canvas.height) {
                ball.velocityY = -ball.velocityY;
            }

            // Paddle collision
            let player = (ball.x < canvas.width / 2) ? user : com;

            if (collision(ball, player)) {
                // Ball hits paddle
                let collidePoint = (ball.y - (player.y + player.height / 2));
                collidePoint = collidePoint / (player.height / 2); // -1 to 1

                let angleRad = (Math.PI / 4) * collidePoint;

                let direction = (ball.x < canvas.width / 2) ? 1 : -1;
                ball.velocityX = direction * ball.speed * Math.cos(angleRad);
                ball.velocityY = ball.speed * Math.sin(angleRad);

                ball.speed += 0.2; // Increase speed
            }

            // Scoring
            if (ball.x - ball.radius < 0) {
                com.score++;
                updateScore();
                resetBall();
            } else if (ball.x + ball.radius > canvas.width) {
                user.score++;
                updateScore();
                resetBall();
            }

            // Game Over
            if (user.score >= WIN_SCORE || com.score >= WIN_SCORE) {
                endGame();
            }
        }

        function updateScore() {
            document.getElementById('player-score').innerText = user.score;
            document.getElementById('computer-score').innerText = com.score;
        }

        function gameLoop() {
            if (isGameRunning) {
                update();
                render();
                animationId = requestAnimationFrame(gameLoop);
            }
        }

        function startGame() {
            document.getElementById('start-screen').classList.add('hidden');
            document.getElementById('game-over-screen').classList.add('hidden');

            user.score = 0;
            com.score = 0;
            updateScore();
            resetBall();

            isGameRunning = true;
            gameLoop();
        }

        function endGame() {
            isGameRunning = false;
            cancelAnimationFrame(animationId);

            const resultText = (user.score >= WIN_SCORE) ? "YOU WIN!" : "GAME OVER";
            document.getElementById('result-text').innerText = resultText;
            document.getElementById('final-score').innerText = `${user.score} - ${com.score}`;
            document.getElementById('game-over-screen').classList.remove('hidden');
        }

        // Controls
        canvas.addEventListener("mousemove", (evt) => {
            let rect = canvas.getBoundingClientRect();
            user.y = evt.clientY - rect.top - user.height / 2;
        });

        // Touch controls
        canvas.addEventListener("touchmove", (evt) => {
            evt.preventDefault();
            let rect = canvas.getBoundingClientRect();
            let touch = evt.touches[0];
            user.y = touch.clientY - rect.top - user.height / 2;
        }, { passive: false });

        // Keyboard controls
        document.addEventListener("keydown", (evt) => {
            if (evt.key === "ArrowUp") {
                user.y -= 25;
            } else if (evt.key === "ArrowDown") {
                user.y += 25;
            }
        });

        // UI Listeners
        document.getElementById('start-btn').addEventListener('click', startGame);
        document.getElementById('restart-btn').addEventListener('click', startGame);

        // Initial Render
        render();

    </script>
</body>

</html>
