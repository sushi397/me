<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RETRO PONG 2.0 - SYNTHWAVE</title>
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@700&family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-pink: #ff00ff;
            --neon-cyan: #00f3ff;
            --neon-purple: #9d00ff;
            --bg-dark: #050510;
            --glass: rgba(255, 255, 255, 0.05);
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-dark);
            color: #fff;
            font-family: 'Orbitron', sans-serif;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        /* シンセウェーブ背景 */
        .synth-bg {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            background: linear-gradient(to bottom, #1a0033 0%, #050510 100%);
            overflow: hidden;
        }

        .grid-floor {
            position: absolute;
            bottom: 0; width: 200%; height: 50%;
            left: -50%;
            background-image: 
                linear-gradient(transparent 0%, var(--neon-purple) 2%, transparent 3%),
                linear-gradient(90deg, transparent 0%, var(--neon-purple) 2%, transparent 3%);
            background-size: 50px 50px;
            transform: perspective(300px) rotateX(60deg);
            animation: gridScroll 2s linear infinite;
            opacity: 0.3;
        }

        @keyframes gridScroll {
            from { background-position: 0 0; }
            to { background-position: 0 50px; }
        }

        .neon-sun {
            position: absolute;
            bottom: 40%; left: 50%;
            transform: translateX(-50%);
            width: 300px; height: 300px;
            background: linear-gradient(to bottom, #ff00ff, #ffee00);
            border-radius: 50%;
            box-shadow: 0 0 100px #ff00ff88;
            opacity: 0.2;
            mask-image: linear-gradient(to bottom, black 70%, transparent 100%);
        }

        /* メインコンテナ */
        .game-wrapper {
            position: relative;
            background: var(--glass);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 0 50px rgba(0, 0, 0, 0.5);
        }

        canvas {
            display: block;
            background: rgba(0, 0, 0, 0.7);
            border: 2px solid var(--neon-cyan);
            border-radius: 4px;
            box-shadow: 0 0 20px rgba(0, 243, 255, 0.2);
        }

        /* スコア表示 */
        .score-container {
            position: absolute;
            top: -60px;
            width: calc(100% - 60px);
            display: flex;
            justify-content: space-between;
            font-family: 'Syncopate', sans-serif;
            font-size: 1.5rem;
            color: var(--neon-cyan);
            text-shadow: 0 0 10px var(--neon-cyan);
        }

        /* オーバーレイ */
        .overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(5, 5, 16, 0.9);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
            border-radius: 20px;
        }

        .hidden { display: none !important; }

        h1 {
            font-family: 'Syncopate', sans-serif;
            font-size: 2.5rem;
            background: linear-gradient(45deg, var(--neon-pink), var(--neon-cyan));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 2rem;
            text-align: center;
        }

        .btn {
            background: transparent;
            border: 2px solid var(--neon-cyan);
            color: var(--neon-cyan);
            padding: 15px 40px;
            border-radius: 50px;
            font-family: 'Orbitron', sans-serif;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .btn:hover {
            background: var(--neon-cyan);
            color: #000;
            box-shadow: 0 0 30px var(--neon-cyan);
        }

        .back-link {
            position: fixed;
            top: 20px; left: 20px;
            color: rgba(255,255,255,0.3);
            text-decoration: none;
            font-size: 0.8rem;
        }
        .back-link:hover { color: var(--neon-cyan); }

        /* CRTフィルター */
        .crt-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03));
            background-size: 100% 3px, 3px 100%;
            pointer-events: none;
            z-index: 1000;
        }
    </style>
</head>
<body>
    <div class="synth-bg">
        <div class="grid-floor"></div>
        <div class="neon-sun"></div>
    </div>
    <div class="crt-overlay"></div>
    
    <a href="index.html" class="back-link">← RETURN TO PORTFOLIO</a>

    <div class="game-wrapper">
        <div class="score-container">
            <div id="p1-score">00</div>
            <div id="p2-score">00</div>
        </div>
        
        <canvas id="pong" width="800" height="500"></canvas>

        <div id="start-overlay" class="overlay">
            <h1>RETRO PONG<br>SYNTHWAVE</h1>
            <button id="start-btn" class="btn">INITIALIZE</button>
            <p style="margin-top: 20px; color: #666; font-size: 0.8rem;">MOUSE OR ARROWS TO MOVE</p>
        </div>

        <div id="game-over-overlay" class="overlay hidden">
            <h1 id="result-msg">VICTORY</h1>
            <button id="restart-btn" class="btn">REBOOT</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('pong');
        const ctx = canvas.getContext('2d');

        const P1_COLOR = '#ff00ff';
        const P2_COLOR = '#00f3ff';
        const BALL_COLOR = '#fff';

        let gameRunning = false;
        let p1Score = 0;
        let p2Score = 0;
        const WIN_SCORE = 7;

        let particles = [];
        let trails = [];
        let shakeAmount = 0;

        const ball = {
            x: 400, y: 250,
            radius: 14,
            vx: 5, vy: 5,
            speed: 7
        };

        const p1 = {
            x: 20, y: 200,
            w: 12, h: 90,
            targetY: 200
        };

        const p2 = {
            x: 768, y: 200,
            w: 12, h: 90,
            targetY: 200
        };

        function createParticles(x, y, color) {
            for (let i = 0; i < 15; i++) {
                particles.push({
                    x, y,
                    vx: (Math.random() - 0.5) * 10,
                    vy: (Math.random() - 0.5) * 10,
                    life: 1.0,
                    color: color
                });
            }
        }

        function draw() {
            // Apply Screen Shake
            ctx.save();
            if (shakeAmount > 0) {
                ctx.translate((Math.random() - 0.5) * shakeAmount, (Math.random() - 0.5) * shakeAmount);
                shakeAmount *= 0.9;
                if (shakeAmount < 0.1) shakeAmount = 0;
            }

            // Clear
            ctx.fillStyle = 'rgba(5, 5, 16, 0.4)'; // Motion blur effect
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Center Net
            ctx.setLineDash([10, 10]);
            ctx.strokeStyle = 'rgba(157, 0, 255, 0.2)';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(400, 0); ctx.lineTo(400, 500);
            ctx.stroke();
            ctx.setLineDash([]);

            // Draw Trails
            trails.forEach((t, i) => {
                ctx.globalAlpha = t.life;
                ctx.fillStyle = BALL_COLOR;
                ctx.beginPath();
                ctx.arc(t.x, t.y, ball.radius * t.life, 0, Math.PI*2);
                ctx.fill();
                t.life -= 0.05;
            });
            trails = trails.filter(t => t.life > 0);

            // Draw Paddles
            ctx.shadowBlur = 15;
            
            ctx.fillStyle = P1_COLOR;
            ctx.shadowColor = P1_COLOR;
            ctx.fillRect(p1.x, p1.y, p1.w, p1.h);

            ctx.fillStyle = P2_COLOR;
            ctx.shadowColor = P2_COLOR;
            ctx.fillRect(p2.x, p2.y, p2.w, p2.h);

            // Draw Ball
            ctx.fillStyle = BALL_COLOR;
            ctx.shadowColor = BALL_COLOR;
            ctx.beginPath();
            ctx.arc(ball.x, ball.y, ball.radius, 0, Math.PI*2);
            ctx.fill();

            // Draw Particles
            ctx.shadowBlur = 0;
            particles.forEach((p, i) => {
                ctx.globalAlpha = p.life;
                ctx.fillStyle = p.color;
                ctx.fillRect(p.x, p.y, 3, 3);
                p.x += p.vx;
                p.y += p.vy;
                p.life -= 0.02;
            });
            particles = particles.filter(p => p.life > 0);
            ctx.globalAlpha = 1.0;

            ctx.restore();
        }

        function update() {
            if (!gameRunning) return;

            // Move Ball
            ball.x += ball.vx;
            ball.y += ball.vy;

            // Add trails
            trails.push({x: ball.x, y: ball.y, life: 0.5});

            // Wall Collision
            if (ball.y < 0 || ball.y > canvas.height) {
                ball.vy *= -1;
                createParticles(ball.x, ball.y, '#fff');
                shakeAmount = 3;
            }

            // Simple AI
            let aiSpeed = 0.08 + (p1Score / 20); // Scale with player score
            p2.y += (ball.y - (p2.y + p2.h/2)) * aiSpeed;

            // Player follow targetY (Direct follow for better responsiveness)
            p1.y += (p1.targetY - (p1.y + p1.h/2));

            // Paddle bounds
            p1.y = Math.max(0, Math.min(canvas.height - p1.h, p1.y));
            p2.y = Math.max(0, Math.min(canvas.height - p2.h, p2.y));

            // Collision Detection
            let paddle = (ball.x < 400) ? p1 : p2;
            if (ball.x + ball.radius > paddle.x && ball.x - ball.radius < paddle.x + paddle.w &&
                ball.y + ball.radius > paddle.y && ball.y - ball.radius < paddle.y + paddle.h) {
                
                let collidePoint = (ball.y - (paddle.y + paddle.h/2)) / (paddle.h/2);
                let angle = collidePoint * (Math.PI / 4);
                let dir = (ball.x < 400) ? 1 : -1;

                ball.vx = dir * ball.speed * Math.cos(angle);
                ball.vy = ball.speed * Math.sin(angle);
                ball.speed += 0.3;

                createParticles(ball.x, ball.y, (ball.x < 400) ? P1_COLOR : P2_COLOR);
                shakeAmount = 8;
            }

            // Scoring
            if (ball.x < 0) {
                p2Score++;
                resetRound();
            } else if (ball.x > canvas.width) {
                p1Score++;
                resetRound();
            }

            if (p1Score >= WIN_SCORE || p2Score >= WIN_SCORE) {
                gameOver();
            }

            document.getElementById('p1-score').innerText = p1Score.toString().padStart(2, '0');
            document.getElementById('p2-score').innerText = p2Score.toString().padStart(2, '0');
        }

        function resetRound() {
            ball.x = 400; ball.y = 250;
            ball.speed = 7;
            ball.vx = (Math.random() > 0.5 ? 1 : -1) * ball.speed;
            ball.vy = (Math.random() - 0.5) * 6;
            shakeAmount = 15;
        }

        function gameLoop() {
            update();
            draw();
            if (gameRunning) requestAnimationFrame(gameLoop);
        }

        function startGame() {
            p1Score = p2Score = 0;
            gameRunning = true;
            document.getElementById('start-overlay').classList.add('hidden');
            document.getElementById('game-over-overlay').classList.add('hidden');
            resetRound();
            gameLoop();
        }

        function gameOver() {
            gameRunning = false;
            const won = p1Score >= WIN_SCORE;
            document.getElementById('result-msg').innerText = won ? "VICTORY" : "GAME OVER";
            document.getElementById('result-msg').style.background = won ? "linear-gradient(45deg, #00f3ff, #00ff00)" : "linear-gradient(45deg, #ff00ff, #ff0000)";
            document.getElementById('result-msg').style.webkitBackgroundClip = "text";
            document.getElementById('game-over-overlay').classList.remove('hidden');
        }

        // Controls
        canvas.addEventListener('mousemove', e => {
            const rect = canvas.getBoundingClientRect();
            p1.targetY = e.clientY - rect.top;
        });

        document.addEventListener('keydown', e => {
            if (e.key === 'ArrowUp') p1.targetY -= 50;
            if (e.key === 'ArrowDown') p1.targetY += 50;
        });

        document.getElementById('start-btn').onclick = startGame;
        document.getElementById('restart-btn').onclick = startGame;

        // Init draw
        draw();
    </script>
</body>
</html>
