<svg width="600" height="360" viewBox="0 0 600 360" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="600" height="360" fill="#000000" />
  
  <!-- Border -->
  <rect x="5" y="5" width="590" height="350" fill="none" stroke="#00fff2" stroke-width="4" filter="url(#glow)" />
  
  <!-- Game Area Representation -->
  <g transform="translate(225, 30) scale(1.5)">
    <!-- Grid Background -->
    <rect width="100" height="200" fill="#050505" stroke="#111" stroke-width="1"/>
    
    <!-- T Piece (Purple) -->
    <g filter="url(#glow)">
        <rect x="30" y="160" width="10" height="10" fill="#ff00ff" stroke="rgba(255,255,255,0.5)" stroke-width="1"/>
        <rect x="40" y="160" width="10" height="10" fill="#ff00ff" stroke="rgba(255,255,255,0.5)" stroke-width="1"/>
        <rect x="50" y="160" width="10" height="10" fill="#ff00ff" stroke="rgba(255,255,255,0.5)" stroke-width="1"/>
        <rect x="40" y="150" width="10" height="10" fill="#ff00ff" stroke="rgba(255,255,255,0.5)" stroke-width="1"/>
    </g>

    <!-- I Piece (Cyan) -->
    <g filter="url(#glow)">
        <rect x="0" y="180" width="10" height="10" fill="#00fff2" stroke="rgba(255,255,255,0.5)" stroke-width="1"/>
        <rect x="10" y="180" width="10" height="10" fill="#00fff2" stroke="rgba(255,255,255,0.5)" stroke-width="1"/>
        <rect x="20" y="180" width="10" height="10" fill="#00fff2" stroke="rgba(255,255,255,0.5)" stroke-width="1"/>
        <rect x="30" y="180" width="10" height="10" fill="#00fff2" stroke="rgba(255,255,255,0.5)" stroke-width="1"/>
    </g>

    <!-- O Piece (Yellow) -->
    <g filter="url(#glow)">
        <rect x="80" y="170" width="10" height="10" fill="#ffff00" stroke="rgba(255,255,255,0.5)" stroke-width="1"/>
        <rect x="90" y="170" width="10" height="10" fill="#ffff00" stroke="rgba(255,255,255,0.5)" stroke-width="1"/>
        <rect x="80" y="180" width="10" height="10" fill="#ffff00" stroke="rgba(255,255,255,0.5)" stroke-width="1"/>
        <rect x="90" y="180" width="10" height="10" fill="#ffff00" stroke="rgba(255,255,255,0.5)" stroke-width="1"/>
    </g>
    
    <!-- Z Piece (Red) - Falling -->
    <g filter="url(#glow)">
        <rect x="40" y="50" width="10" height="10" fill="#ff0000" stroke="rgba(255,255,255,0.5)" stroke-width="1"/>
        <rect x="50" y="50" width="10" height="10" fill="#ff0000" stroke="rgba(255,255,255,0.5)" stroke-width="1"/>
        <rect x="50" y="60" width="10" height="10" fill="#ff0000" stroke="rgba(255,255,255,0.5)" stroke-width="1"/>
        <rect x="60" y="60" width="10" height="10" fill="#ff0000" stroke="rgba(255,255,255,0.5)" stroke-width="1"/>
    </g>
  </g>

  <!-- Decoration Text -->
  <text x="50%" y="30" text-anchor="middle" fill="#00fff2" font-family="monospace" font-size="20" filter="url(#glow)">SCORE: 1250</text>
  <text x="50%" y="340" text-anchor="middle" fill="#ff00ff" font-family="monospace" font-size="16" filter="url(#glow)">INSERT COIN</text>

</svg>
